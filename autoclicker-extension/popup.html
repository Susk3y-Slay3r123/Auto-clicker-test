<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 10px; }
    button { width: 100%; margin: 5px 0; padding: 8px; }
    input { width: 60%; padding: 6px; }
    .flex { display: flex; }
    .status { margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h3>Overlay Autoclicker</h3>
  <button id="toggle">Start Clicker</button>
  <div class="flex">
    <input id="cps" type="number" placeholder="CPS (220)" value="220">
    <button id="setcps">Set</button>
  </div>
  <div class="flex">
    <input id="timer" type="number" placeholder="Timer (sec)">
    <button id="settimer">Set</button>
  </div>
  <button id="cancel">Cancel Timer</button>
  <div class="status" id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
